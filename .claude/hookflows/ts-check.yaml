name: "TypeScript Check"
stop_reason: "TypeScript checks failed, please fix before proceeding"

on: [Stop, TaskCompleted]

paths:
  - "src/**/*.ts"
paths-ignore:
  - "src/**/*.test.ts"

jobs:
  typecheck:
    steps:
      - run: npm run typecheck
  lint:
    continue: true
    steps:
      - run: npm run lint
  test:
    needs: typecheck
    steps:
      - run: npm test
