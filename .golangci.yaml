version: 2

linters:
  default: standard
  enable:
    - unconvert
    - gosec
    - cyclop
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (*encoding/json.Decoder).Decode
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    revive:
      max-open-files: 2048
      rules:
        - name: blank-imports
          severity: warning
          disabled: false
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G115
        - G204
        - G304
    cyclop:
      max-complexity: 30

run:
  tests: false
  timeout: 15m
  concurrency: 15
  relative-path-mode: gomod
  issues-exit-code: 2

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
