name: tagpr and release
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag"
        required: false
        type: string

permissions:
  pull-requests: write
  contents: write

jobs:
  tagpr:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          ref: ${{ inputs.tag || github.ref }}

      - id: tagpr
        uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1
        if: ${{ github.event_name != 'workflow_dispatch' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      # On release PR phase: build and commit dist/
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ fromJSON(steps.tagpr.outputs.pull_request).head.ref }}
          fetch-depth: 0
        if: ${{ steps.tagpr.outputs.tag == '' && github.event_name != 'workflow_dispatch' }}

      - name: Build dist
        if: ${{ steps.tagpr.outputs.tag == '' && github.event_name != 'workflow_dispatch' }}
        run: |
          npm ci
          npm run build

      - name: Commit dist if changed
        if: ${{ steps.tagpr.outputs.tag == '' && github.event_name != 'workflow_dispatch' }}
        run: |
          if git diff --quiet plugins/hookflow/dist/; then
            echo "No changes to dist/"
          else
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add plugins/hookflow/dist/
            git commit -m "build: update dist/"
            git push
          fi
