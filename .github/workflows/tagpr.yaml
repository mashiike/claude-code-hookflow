name: tagpr and release
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag"
        required: false
        type: string

permissions:
  pull-requests: write
  contents: write

jobs:
  tagpr:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
          ref: ${{ inputs.tag || github.ref }}

      - id: tagpr
        uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1
        if: ${{ github.event_name != 'workflow_dispatch' }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      # On release PR phase: build and commit dist/
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ fromJSON(steps.tagpr.outputs.pull_request).head.ref }}
          fetch-depth: 0
        if: ${{ steps.tagpr.outputs.tag == '' && github.event_name != 'workflow_dispatch' }}

      - name: Build dist
        if: ${{ steps.tagpr.outputs.tag == '' && github.event_name != 'workflow_dispatch' }}
        run: |
          npm ci
          npm run build

      - name: Commit dist if changed
        if: ${{ steps.tagpr.outputs.tag == '' && github.event_name != 'workflow_dispatch' }}
        run: |
          if git diff --quiet plugins/hookflow/dist/; then
            echo "No changes to dist/"
          else
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add plugins/hookflow/dist/
            git commit -m "build: update dist/"
            git push
          fi
